<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioEscola v2.0 - Futurista</title>
    <style>
        :root {
            --primary: #00ff66; --citologia: #00ff66; --zoologia: #00f0ff;
            --botanica: #a2ff00; --genetica: #bf00ff; --evolucao: #ff6600;
            --bg: #050a08; --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0; font-family: 'Segoe UI', sans-serif;
            background: var(--bg); color: #fff; overflow-x: hidden;
        }

        .bio-particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: radial-gradient(circle at center, #0a1a12 0%, #050a08 100%);
        }
        .particle {
            position: absolute; background: var(--primary); border-radius: 50%;
            filter: blur(5px); opacity: 0.2; animation: float 20s infinite linear;
        }
        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.3; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        header {
            padding: 30px; text-align: center; border-bottom: 1px solid rgba(0,255,102,0.2);
            backdrop-filter: blur(15px); background: rgba(0,0,0,0.5);
        }
        h1 { margin: 0; font-size: 3em; letter-spacing: 5px; text-shadow: 0 0 15px var(--primary); }

        nav {
            display: flex; justify-content: center; flex-wrap: wrap; 
            gap: 15px; padding: 20px; position: sticky; top: 0; z-index: 10;
        }
        nav button {
            background: transparent; border: 1px solid var(--primary); color: #fff;
            padding: 10px 20px; cursor: pointer; transition: 0.4s; border-radius: 5px;
            font-weight: bold; text-transform: uppercase;
        }
        nav button:hover { background: var(--primary); color: #000; box-shadow: 0 0 20px var(--primary); }

        .container { 
            max-width: 1100px; margin: 40px auto; padding: 20px;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px;
        }
        .card {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            padding: 25px; border-radius: 15px; backdrop-filter: blur(10px);
            transition: 0.4s; position: relative; overflow: hidden;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 0 30px rgba(0,255,102,0.2); }
        .card h3 { color: var(--primary); margin-top: 0; font-size: 1.5em; }
        
        .btn-ler {
            background: transparent; border: 1px solid rgba(255, 255, 255, 0.3); padding: 12px; width: 100%;
            border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 15px;
            color: #fff; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-ler:hover { 
            background: var(--primary); color: #000; border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary);
        }

        #abaConteudo {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 10, 8, 0.95); z-index: 100; display: none;
            flex-direction: column; align-items: center; padding: 40px 20px;
            overflow-y: auto; box-sizing: border-box; backdrop-filter: blur(15px);
        }
        
        .caixa-leitura {
            max-width: 800px; width: 100%; background: rgba(0, 0, 0, 0.75);
            border: 1px solid rgba(0, 255, 102, 0.4); border-radius: 16px;
            padding: 40px; box-sizing: border-box; margin-top: 20px; margin-bottom: 50px;
            box-shadow: 0 0 40px rgba(0, 255, 102, 0.15); backdrop-filter: blur(10px);
        }

        .conteudo-texto { 
            line-height: 1.9; font-size: 1.2em; color: #e0e0e0; 
            text-align: justify; word-wrap: break-word; 
        }
        
        .conteudo-img {
            max-width: 100%; max-height: 400px; margin: 25px auto; border-radius: 10px;
            border: 1px solid var(--primary); box-shadow: 0 0 20px rgba(0, 255, 102, 0.2);
            display: none; object-fit: cover;
        }

        .btn-fechar {
            background: #ff4444; color: white; border: none; padding: 12px 35px;
            border-radius: 50px; cursor: pointer; font-weight: bold; margin-bottom: 10px;
            box-shadow: 0 0 15px rgba(255, 68, 68, 0.3); transition: 0.3s;
            text-transform: uppercase; font-size: 14px;
        }
        .btn-fechar:hover { transform: scale(1.05); filter: brightness(1.2); }

        .btn-admin-flutuante {
            position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px;
            background: #fff; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; cursor: pointer; font-size: 30px; z-index: 50;
        }
    </style>
</head>
<body>

    <div class="bio-particles" id="particles"></div>

    <header>
        <h1>BIO//ESCOLA</h1>
        <p style="color: var(--primary); letter-spacing: 2px;">SISTEMA BIOLÓGICO DE INFORMAÇÃO</p>
    </header>

    <nav>
        <button onclick="filtrar('todos')">Todos</button>
        <button onclick="filtrar('citologia')">Citologia</button>
        <button onclick="filtrar('zoologia')">Zoologia</button>
        <button onclick="filtrar('botanica')">Botânica</button>
        <button onclick="filtrar('genetica')">Genética</button>
        <button onclick="filtrar('evolucao')">Evolução</button>
    </nav>

    <div class="container" id="feed"></div>

    <div id="abaConteudo">
        <button class="btn-fechar" onclick="fecharAba()">✖ FECHAR ARQUIVO</button>
        
        <div class="caixa-leitura">
            <h2 id="abaTitulo" style="font-size: 2.5em; color: var(--primary); margin-top: 0; border-bottom: 1px solid rgba(0,255,102,0.2); padding-bottom: 15px;"></h2>
            <img id="abaImagem" class="conteudo-img" src="" alt="Imagem Ilustrativa">
            <div class="conteudo-texto" id="abaTexto"></div>
        </div>
    </div>

    <div class="btn-admin-flutuante" onclick="window.location.href='/admin'">⚙️</div>

    <script>
        let todosConteudos = [];

        if(!localStorage.getItem('bio_conteudos')) {
            const padrao = [{
                id: "1",
                titulo: "Introdução à Citologia",
                categoria: "citologia",
                texto: "A citologia é o ramo da biologia que estuda as células, suas estruturas e funções. Todas as plantas e animais são formados por células básicas que mantêm a vida.",
                imagem: ""
            }];
            localStorage.setItem('bio_conteudos', JSON.stringify(padrao));
        }

        function criarParticulas() {
            const painel = document.getElementById('particles');
            for(let i=0; i<30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.width = Math.random() * 8 + 'px';
                p.style.height = p.style.width;
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = Math.random() * 10 + 10 + 's';
                p.style.animationDelay = Math.random() * 10 + 's';
                painel.appendChild(p);
            }
        }

        function buscar() {
            todosConteudos = JSON.parse(localStorage.getItem('bio_conteudos')) || [];
            filtrar('todos');
        }

        function filtrar(cat) {
            const feed = document.getElementById('feed');
            feed.innerHTML = '';
            
            const filtrados = cat === 'todos' ? todosConteudos : todosConteudos.filter(c => c.categoria === cat);
            
            if(filtrados.length === 0) {
                feed.innerHTML = '<p style="text-align:center; grid-column: 1/-1; opacity:0.5;">Nenhum conteúdo cadastrado nesta categoria.</p>';
                return;
            }

            filtrados.forEach((c, index) => {
                feed.innerHTML += `
                    <div class="card">
                        <div>
                            <h3>${c.titulo}</h3>
                            <p style="opacity: 0.7; line-height: 1.5;">${c.texto.substring(0,100)}...</p>
                        </div>
                        <button class="btn-ler" onclick="abrirMateriaPorIndex(${index}, '${cat}')">VER CONTEÚDO COMPLETO</button>
                    </div>`;
            });
        }

        function abrirMateriaPorIndex(index, cat) {
            const filtrados = cat === 'todos' ? todosConteudos : todosConteudos.filter(c => c.categoria === cat);
            const c = filtrados[index];
            if(!c) return;

            document.getElementById('abaTitulo').innerText = c.titulo;
            document.getElementById('abaTexto').innerHTML = c.texto.replace(/\n/g, '<br>');
            
            const imgElement = document.getElementById('abaImagem');
            if(c.imagem && c.imagem.trim() !== "") {
                imgElement.src = c.imagem;
                imgElement.style.display = 'block';
            } else {
                imgElement.style.display = 'none';
                imgElement.src = "";
            }

            document.getElementById('abaConteudo').style.display = 'flex';
            document.body.style.overflow = 'hidden'; 
        }

        function fecharAba() {
            document.getElementById('abaConteudo').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        criarParticulas();
        buscar();
    </script>
</body>
</html>
