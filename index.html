<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>BioEscola - Portal de Biologia</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background-color: #f4f9f4; }
        header { background-color: #2e7d32; color: white; padding: 30px; text-align: center; }
        nav { background-color: #4caf50; display: flex; justify-content: center; padding: 10px; }
        nav button { background: none; border: none; color: white; font-weight: bold; margin: 0 15px; cursor: pointer; font-size: 16px; }
        .container { max-width: 800px; margin: 20px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .conteudo-box { border-left: 4px solid #4caf50; padding: 15px; margin-bottom: 25px; background: #fafafa; }
        .btn-ler { color: #2e7d32; font-weight: bold; cursor: pointer; background: none; border: none; font-size: 16px; padding: 0; }
        .btn-admin { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; border: none; padding: 15px; border-radius: 50%; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>
    <header>
        <h1>🔬 BioEscola</h1>
        <p>Conteúdos de Biologia para transformar o seu conhecimento.</p>
    </header>
    <nav>
        <button onclick="filtrar('todos')">Todos</button>
        <button onclick="filtrar('citologia')">Citologia</button>
        <button onclick="filtrar('zoologia')">Zoologia</button>
        <button onclick="filtrar('botanica')">Botânica</button>
    </nav>
    <div class="container">
        <div id="feed">Carregando conteúdos...</div>
    </div>
    
    <button class="btn-admin" onclick="window.open('admin.html', '_blank')" title="Acessar Painel">⚙️</button>

    <script>
        // ALTERADO: Agora aponta para a porta 5000 do novo servidor
        const API = 'http://localhost:5000/api/conteudos';
        let todosConteudos = [];

        async function buscar() {
            try {
                const res = await fetch(API);
                const json = await res.json();
                todosConteudos = json.dados;
                filtrar('todos');
            } catch(e) { 
                document.getElementById('feed').innerText = 'Erro ao conectar ao servidor backend na porta 5000.'; 
            }
        }

        function filtrar(cat) {
            const feed = document.getElementById('feed');
            feed.innerHTML = '';
            const filtrados = cat === 'todos' ? todosConteudos : todosConteudos.filter(c => c.categoria === cat);
            
            if(filtrados.length === 0) {
                feed.innerHTML = '<p>Nenhum conteúdo nesta categoria.</p>';
                return;
            }

            filtrados.forEach(c => {
                feed.innerHTML += `
                    <div class="conteudo-box">
                        <h3>${c.titulo}</h3>
                        <p>${c.texto.substring(0,120)}...</p>
                        <button class="btn-ler" onclick="alert('${c.texto.replace(/'/g, "\\'")}')">Ler conteúdo completo...</button>
                    </div>`;
            });
        }
        buscar();
    </script>
</body>
</html>
